<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Overlay TikTok Mekirs</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 720px;
      height: 1280px;
      background: transparent;
      overflow: hidden;
    }

    .canvas {
      position: relative;
      width: 720px;
      height: 1280px;
    }

    iframe {
      position: absolute;
      border: none;
      transform-origin: top left;
      background: transparent;
    }

    /* 🎆 FUEGOS */
    .firework {
      top: -30px;
      left: 50%;
      transform: translateX(-50%) scale(1.5);
      width: 720px;
      height: 250px;
      pointer-events: none;
      z-index: 10;
    }

    /* 🔔 ALERTS */
    .alerts {
      top: 140px;
      left: 50%;
      transform: translateX(-50%) scale(0.9);
      width: 500px;
      height: 200px;
      z-index: 6;
    }

    /* 🔥 ACCIONES */
    .acciones {
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 150px;
      z-index: 5;
    }

    /* 💬 CHAT (un poquito más pequeño) */
    .chat {
      top: 180px;
      left: -5px;
      width: 280px;
      height: 420px;
      transform: scale(0.85); /* antes 0.9 */
    }

    /* 💰 DONANTES (más a la derecha) */
    .topgifter {
      top: 170px;
      right: -15px;
      width: 300px;
      height: 200px;
      transform: scale(0.7);
    }

    /* ❤️ LIKES (más a la derecha) */
    .topliker {
      top: 310px;
      right: -15px;
      width: 300px;
      height: 200px;
      transform: scale(0.7);
    }

    /* 🎯 META */
    .meta {
      top: 540px;
      left: -10px;
      width: 500px;
      height: 200px;
      transform: scale(0.85);
    }

  </style>
</head>

<body>
  <div class="canvas">

    <iframe class="firework"
      src="https://tikfinity.zerody.one/widget/firework?cid=1638627"></iframe>

    <iframe class="acciones"
      src="https://tikfinity.zerody.one/widget/myactions?cid=1638627&screen=1"></iframe>

    <iframe class="alerts"
      src="https://app.streamtoearn.io/overlay/6a507be13a91eda3b1c241c9/alerts/1"></iframe>

    <iframe class="chat"
      src="https://tikfinity.zerody.one/widget/chat?cid=1638627"></iframe>

    <iframe class="topgifter"
      src="https://tikfinity.zerody.one/widget/topgifter?cid=1638627"></iframe>

    <iframe class="topliker"
      src="https://tikfinity.zerody.one/widget/topliker?cid=1638627"></iframe>

    <iframe class="meta"
      src="https://tikfinity.zerody.one/widget/goal?cid=1638627&metric=coins"></iframe>

  </div>
</body>
</html>
