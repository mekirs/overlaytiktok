<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Overlay TikTok Mekirs</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 1440px;
      height: 1280px;
      background: transparent;
      overflow: hidden;
    }

    .canvas {
      position: relative;
      width: 1440px;
      height: 1280px;
    }

    iframe {
      position: absolute;
      border: none;
      transform-origin: top left;
    }

    /* 🔥 ACCIONES */
    .acciones {
      top: 80px;
      left: 360px;
      transform: translateX(-50%);
      width: 500px;
      height: 150px;
    }

    /* 💰 DONANTES */
    .topgifter {
      top: 200px;
      left: 10px;
      width: 300px;
      height: 200px;
      transform: scale(0.7);
    }

    /* ❤️ LIKES */
    .topliker {
      top: 340px;
      left: 10px;
      width: 300px;
      height: 200px;
      transform: scale(0.7);
    }

    /* 💬 CHAT */
    .chat {
      top: 600px;
      left: 0px;
      width: 260px;
      height: 400px;
      transform: scale(0.8);
    }

    /* 🎯 META */
    .meta {
      top: 540px;
      left: -10px;
      width: 500px;
      height: 200px;
      transform: scale(0.85);
    }

    /* ================= DERECHA ================= */

    .right-panel {
      position: absolute;
      left: 720px;
      top: 0;
      width: 720px;
      height: 1280px;
      background: rgba(0,0,0,0.4);
    }

    .youtube {
      top: 0;
      left: 720px;
      width: 720px;
      height: 1280px;
    }

  </style>
</head>

<body>
  <div class="canvas">

    <iframe class="acciones"
      src="https://tikfinity.zerody.one/widget/myactions?cid=1638627&screen=1"></iframe>

    <iframe class="topgifter"
      src="https://tikfinity.zerody.one/widget/topgifter?cid=1638627"></iframe>

    <iframe class="topliker"
      src="https://tikfinity.zerody.one/widget/topliker?cid=1638627"></iframe>

    <iframe class="chat"
      src="https://tikfinity.zerody.one/widget/chat?cid=1638627"></iframe>

    <iframe class="meta"
      src="https://tikfinity.zerody.one/widget/goal?cid=1638627&metric=coins"></iframe>

    <!-- DERECHA -->
    <div class="right-panel"></div>

    <iframe class="youtube"
      src="https://www.youtube.com/embed/videoseries?list=PLpDQJRSYgGF9WbOjwrZLW8igv_jDk182T"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>

  </div>
</body>
</html>
