<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Overlay TikTok Mekirs</title>

  <style>
    /* Fondo transparente y tamaño vertical */
    html, body {
      margin: 0;
      padding: 0;
      width: 720px;
      height: 1280px;
      background: transparent;
      overflow: hidden;
    }

    .canvas {
      position: relative;
      width: 720px;
      height: 1280px;
    }

    iframe {
      position: absolute;
      border: none;
      background: transparent;
    }

    /* 🔥 ACCIONES (arriba centro) */
    .acciones {
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 150px;
      z-index: 5;
    }

    /* 🎆 FUEGOS (arriba centro encima) */
    .firework {
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 720px;
      height: 250px;
      z-index: 10;
      pointer-events: none;
    }

    /* 💬 CHAT (arriba izquierda) */
    .chat {
      top: 200px;
      left: 10px;
      width: 260px;
      height: 400px;
    }

    /* 🎯 META (centro) */
    .meta {
      top: 400px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 200px;
    }

    /* 🎠 DESLIZADOR (debajo de meta) */
    .carousel {
      top: 620px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 220px;
    }

    /* 💰 TOP DONANTES (abajo izquierda) */
    .topgifter {
      bottom: 40px;
      left: 10px;
      width: 300px;
      height: 200px;
    }

    /* ❤️ TOP LIKES (al costado de donantes) */
    .topliker {
      bottom: 40px;
      left: 320px;
      width: 300px;
      height: 200px;
    }

  </style>
</head>

<body>
  <div class="canvas">

    <!-- Fuegos -->
    <iframe class="firework"
      src="https://tikfinity.zerody.one/widget/firework?cid=1638627">
    </iframe>

    <!-- Acciones -->
    <iframe class="acciones"
      src="https://tikfinity.zerody.one/widget/myactions?cid=1638627&screen=1">
    </iframe>

    <!-- Chat -->
    <iframe class="chat"
      src="https://tikfinity.zerody.one/widget/chat?cid=1638627">
    </iframe>

    <!-- Meta -->
    <iframe class="meta"
      src="https://tikfinity.zerody.one/widget/goal?cid=1638627&metric=coins">
    </iframe>

    <!-- Deslizador -->
    <iframe class="carousel"
      src="https://tikfinity.zerody.one/widget/carousel?cid=1638627">
    </iframe>

    <!-- Top donantes -->
    <iframe class="topgifter"
      src="https://tikfinity.zerody.one/widget/topgifter?cid=1638627">
    </iframe>

    <!-- Top likes -->
    <iframe class="topliker"
      src="https://tikfinity.zerody.one/widget/topliker?cid=1638627">
    </iframe>

  </div>
</body>
</html>
