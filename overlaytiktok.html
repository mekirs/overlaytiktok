<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Overlay TikTok Mekirs</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 720px;
      height: 1280px;
      background: transparent;
      overflow: hidden;
    }

    .canvas {
      position: relative;
      width: 720px;
      height: 1280px;
    }

    iframe {
      position: absolute;
      border: none;
      transform-origin: top left;
    }

    /* 🔥 ACCIONES */
    .acciones {
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 150px;
    }

    /* 🚨 ALERTS (al costado de acciones) */
    .alerts {
      top: 80px;
      left: 520px; /* a la derecha de acciones */
      width: 200px;
      height: 150px;
      transform: scale(0.8);
    }

    /* 💰 DONANTES */
    .topgifter {
      top: 200px;
      left: 10px;
      width: 300px;
      height: 200px;
      transform: scale(0.7);
    }

    /* ❤️ LIKES */
    .topliker {
      top: 340px;
      left: 10px;
      width: 300px;
      height: 200px;
      transform: scale(0.7);
    }

    /* 💬 CHAT */
    .chat {
      top: 600px;
      left: 0px;
      width: 280px;
      height: 420px;
      transform: scale(0.9);
    }

    /* 🎯 META */
    .meta {
      top: 540px;
      left: -10px;
      width: 500px;
      height: 200px;
      transform: scale(0.85);
    }

  </style>
</head>

<body>
  <div class="canvas">

    <iframe class="acciones"
      src="https://tikfinity.zerody.one/widget/myactions?cid=1638627&screen=1"></iframe>

    <!-- ALERTAS NUEVAS -->
    <iframe class="alerts"
      src="https://app.streamtoearn.io/overlay/6a507be13a91eda3b1c241c9/alerts/1"></iframe>

    <iframe class="topgifter"
      src="https://tikfinity.zerody.one/widget/topgifter?cid=1638627"></iframe>

    <iframe class="topliker"
      src="https://tikfinity.zerody.one/widget/topliker?cid=1638627"></iframe>

    <iframe class="chat"
      src="https://tikfinity.zerody.one/widget/chat?cid=1638627"></iframe>

    <iframe class="meta"
      src="https://tikfinity.zerody.one/widget/goal?cid=1638627&metric=coins"></iframe>

  </div>
</body>
</html>
