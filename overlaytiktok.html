<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Overlay TikTok Mekirs</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 720px;
      height: 1280px;
      background: transparent;
      overflow: hidden;
    }

    .canvas {
      position: relative;
      width: 720px;
      height: 1280px;
    }

    iframe {
      position: absolute;
      border: none;
      transform-origin: top left;
      background: transparent;
    }

    /* 🎆 FUEGOS */
    .firework {
      top: -20px;
      left: 50%;
      transform: translateX(-50%) scale(1.3);
      width: 720px;
      height: 250px;
      pointer-events: none;
      z-index: 10;
    }

    /* 🔔 ALERTS */
    .alerts {
      top: 140px;
      left: 50%;
      transform: translateX(-50%) scale(0.9);
      width: 500px;
      height: 200px;
      z-index: 6;
    }

    /* 🔥 ACCIONES */
    .acciones {
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 150px;
      z-index: 5;
    }

    /* 💬 CHAT (AHORA ARRIBA IZQUIERDA) */
    .chat {
      top: 200px;
      left: 10px;
      width: 280px;
      height: 420px;
      transform: scale(0.9);
    }

    /* 💰 DONANTES (DERECHA) */
    .topgifter {
      top: 200px;
      right: 10px;
      width: 300px;
      height: 200px;
      transform: scale(0.7);
    }

    /* ❤️ LIKES (DEBAJO DONANTES) */
    .topliker {
      top: 350px;
      right: 10px;
      width: 300px;
      height: 200px;
      transform: scale(0.7);
    }

    /* 🎯 META */
    .meta {
      top: 540px;
      left: -10px;
      width: 500px;
      height: 200px;
      transform: scale(0.85);
    }

  </style>
</head>

<body>
  <div class="canvas">

    <!-- FUEGOS -->
    <iframe class="firework"
      src="https://tikfinity.zerody.one/widget/firework?cid=1638627"></iframe>

    <!-- ACCIONES -->
    <iframe class="acciones"
      src="https://tikfinity.zerody.one/widget/myactions?cid=1638627&screen=1"></iframe>

    <!-- ALERTS -->
    <iframe class="alerts"
      src="https://app.streamtoearn.io/overlay/6a507be13a91eda3b1c241c9/alerts/1"></iframe>

    <!-- CHAT -->
    <iframe class="chat"
      src="https://tikfinity.zerody.one/widget/chat?cid=1638627"></iframe>

    <!-- DONANTES -->
    <iframe class="topgifter"
      src="https://tikfinity.zerody.one/widget/topgifter?cid=1638627"></iframe>

    <!-- LIKES -->
    <iframe class="topliker"
      src="https://tikfinity.zerody.one/widget/topliker?cid=1638627"></iframe>

    <!-- META -->
    <iframe class="meta"
      src="https://tikfinity.zerody.one/widget/goal?cid=1638627&metric=coins"></iframe>

  </div>
</body>
</html>
